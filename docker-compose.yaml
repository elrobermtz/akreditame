version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: akreditame-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akreditame_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akreditame_password}
      POSTGRES_DB: ${POSTGRES_DB:-akreditame_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-akreditame_user}:${POSTGRES_PASSWORD:-akreditame_password}@akreditame-db:5432/${POSTGRES_DB:-akreditame_db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RESEND_API_KEY: ${RESEND_API_KEY}

  app:
    build: ./app
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL}

volumes:
  postgres_data:
