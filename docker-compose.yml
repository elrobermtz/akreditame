version: \"3.8\"\nservices:\n  db:\n    image: postgres:15-alpine\n    environment:\n      POSTGRES_USER: akreditame_user\n      POSTGRES_PASSWORD: akreditame_password\n      POSTGRES_DB: akreditame_db\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  api:\n    build: ./api\n    ports:\n      - \"3001:3001\"\n    depends_on:\n      - db\n    environment:\n      DATABASE_URL: postgres://akreditame_user:akreditame_password@db:5432/akreditame_db\n\n  app:\n    build: ./app\n    ports:\n      - \"80:80\"\n    depends_on:\n      - api\n\nvolumes:\n  postgres_data:
